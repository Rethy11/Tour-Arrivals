<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tour Arrivals</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #3182ce;
            --accent-hover: #2b6cb0;
        }

        body.theme-mt { --bg-color: #ebf8ff; --accent: #3182ce; --accent-hover: #2b6cb0; }
        body.theme-jtj { --bg-color: #fffbeb; --accent: #d97706; --accent-hover: #b45309; }
        body.theme-babm { --bg-color: #ecfdf5; --accent: #059669; --accent-hover: #047857; }
        body.theme-ga { --bg-color: #f5f3ff; --accent: #7c3aed; --accent-hover: #6d28d9; }

        body, html {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100%; display: flex; flex-direction: column; overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .view {
            display: none; flex: 1; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; text-align: center; width: 100%; box-sizing: border-box;
            position: relative;
        }
        .view.active { display: flex; }

        .button-group {
            display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px;
        }
        .file-btn-wrapper { position: relative; overflow: hidden; width: 100%; }
        .file-btn-wrapper.dragover .camera-btn {
            outline: 3px dashed var(--accent);
            outline-offset: 3px;
        }
        .camera-btn {
            width: 100%; padding: 20px; font-size: 1.1rem; font-weight: bold;
            background-color: var(--accent); color: white; border: none;
            border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s, outline 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .camera-btn:hover { background-color: var(--accent-hover); }
        .file-btn-wrapper input[type=file] {
            font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%;
        }
        .secondary-btn {
            background-color: var(--card-bg); color: var(--text-main); border: 2px solid #e2e8f0;
        }

        .progress-container { display: none; width: 100%; max-width: 300px; margin-top: 30px; }
        .progress-bar { width: 100%; height: 8px; background-color: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: var(--accent); width: 0%; transition: width 0.2s; }
        #status-text { color: var(--text-muted); margin-top: 15px; font-size: 0.95rem; font-weight: 500;}
        #error-text { color: #dc2626; margin-top: 15px; font-size: 0.9rem; font-weight: 500; display: none; max-width: 320px; }

        #main-view-content { transition: transform 0.3s ease-out, opacity 0.15s; }
        .acronym { font-size: 1.5rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px; transition: color 0.4s ease;}
        .time { font-size: 4.5rem; font-weight: 700; margin: 0; color: var(--text-main); letter-spacing: -2px;}
        .guest-name { font-size: 1.2rem; font-weight: 600; color: var(--text-main); margin-top: 10px; }
        .visitors { font-size: 1.5rem; margin-top: 10px; color: var(--text-muted); }
        .visitors span { font-weight: bold; color: var(--accent); transition: color 0.4s ease; }

        /* Carousel (scroll-based navigation) */
        .carousel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 18px;
            touch-action: pan-y;
            will-change: transform, opacity;
        }
        .carousel-item.adjacent {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.18;
            transform: scale(0.7);
            filter: grayscale(30%);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .carousel-item.adjacent.empty { visibility: hidden; }
        .adj-acronym { font-size: 1rem; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); }
        .adj-time { font-size: 2.2rem; font-weight: 700; margin-top: 2px; color: var(--text-main); }
        .carousel-item.adjacent.mt .adj-acronym { color: #3182ce; }
        .carousel-item.adjacent.jtj .adj-acronym { color: #d97706; }
        .carousel-item.adjacent.babm .adj-acronym { color: #059669; }
        .carousel-item.adjacent.ga .adj-acronym { color: #7c3aed; }

        .controls { display: none; text-align: center; width: 100%; padding-bottom: 40px; }
        .controls.active { display: block; }
        .view-all-btn {
            padding: 15px 40px; font-size: 1rem; font-weight: 600; background-color: var(--card-bg);
            color: var(--accent); border: 2px solid #e2e8f0; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: color 0.4s ease;
        }
        .new-file-btn {
            margin-top: 12px; background: none; border: none; color: var(--text-muted);
            font-size: 0.85rem; cursor: pointer; text-decoration: underline;
        }

        .arrival-prompt {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            max-width: 320px;
            margin: 0 auto 14px auto;
            padding: 12px 16px;
            background-color: var(--card-bg);
            border: 2px solid var(--accent);
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            text-align: left;
            transition: border-color 0.4s ease;
        }
        .arrival-prompt-text { font-size: 0.92rem; font-weight: 600; color: var(--text-main); }
        .arrival-prompt-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .prompt-btn {
            width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
            font-size: 1.1rem; font-weight: 700; color: white; display: flex;
            align-items: center; justify-content: center;
            transition: transform 0.15s ease, background-color 0.15s ease;
        }
        .prompt-btn:active { transform: scale(0.92); }
        .prompt-btn.yes { background-color: #059669; }
        .prompt-btn.yes:hover { background-color: #047857; }
        .prompt-btn.no { background-color: #dc2626; }
        .prompt-btn.no:hover { background-color: #b91c1c; }

        #modal {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background-color: var(--card-bg); z-index: 10; transition: top 0.3s ease-in-out;
            display: flex; flex-direction: column;
        }
        #modal.open { top: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #e2e8f0; }
        .modal-header h2 { margin: 0; font-size: 1.5rem; }
        .modal-header-actions { display: flex; align-items: center; gap: 14px; }
        .close-btn { background: none; border: none; font-size: 2rem; color: var(--text-muted); cursor: pointer; line-height: 1; }

        .pencil-btn {
            background: none; border: none; cursor: pointer; padding: 6px;
            display: flex; align-items: center; justify-content: center;
            color: #a0aec0; border-radius: 8px; transition: color 0.2s, background-color 0.2s;
        }
        .pencil-btn:hover { color: #718096; background-color: #f7f9fc; }
        .pencil-btn.active { color: var(--accent); background-color: #f7f9fc; }

        .add-entry-bar {
            display: none; gap: 8px; flex-wrap: wrap; align-items: center;
            padding: 14px 20px; border-bottom: 1px solid #e2e8f0; background-color: #f7f9fc;
        }
        .add-entry-bar.open { display: flex; }
        .add-entry-bar select, .add-entry-bar input {
            padding: 9px 10px; border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 0.9rem; flex: 1; min-width: 90px; background: white; color: var(--text-main);
        }
        .add-entry-bar input[type="text"] { flex: 1 1 100%; }
        .add-entry-bar button {
            padding: 9px 16px; border: none; border-radius: 8px; background-color: var(--accent);
            color: white; font-weight: 600; cursor: pointer; white-space: nowrap;
        }

        .list-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }

        .list-item {
            display: flex; justify-content: space-between; align-items: center; position: relative;
            padding: 15px; padding-right: 56px; border-radius: 8px; background-color: #f7f9fc;
            border-left: 6px solid #e2e8f0; transition: opacity 0.3s, filter 0.3s;
        }

        .list-actions {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            display: flex; align-items: center; gap: 6px; flex-shrink: 0;
        }
        .arrived-toggle-btn {
            width: 26px; height: 26px; border-radius: 50%; border: none; cursor: pointer;
            font-size: 0.85rem; font-weight: 700; color: white; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
            transition: transform 0.15s ease, background-color 0.15s ease;
        }
        .arrived-toggle-btn:active { transform: scale(0.92); }
        .arrived-toggle-btn.mark-yes { background-color: #059669; }
        .arrived-toggle-btn.mark-yes:hover { background-color: #047857; }
        .arrived-toggle-btn.mark-undo { background-color: #a0aec0; }
        .arrived-toggle-btn.mark-undo:hover { background-color: #718096; }

        .list-item.mt { border-left-color: #3182ce; background-color: #ebf8ff; }
        .list-item.jtj { border-left-color: #d97706; background-color: #fffbeb; }
        .list-item.babm { border-left-color: #059669; background-color: #ecfdf5; }
        .list-item.ga { border-left-color: #7c3aed; background-color: #f5f3ff; }
        .list-item.past { opacity: 0.45; filter: grayscale(40%); }

        .list-container.edit-mode .list-item { cursor: pointer; padding-right: 92px; }
        .list-container.edit-mode .list-item:hover { filter: brightness(0.97); }

        .delete-x {
            display: none; width: 26px; height: 26px; border-radius: 50%; background: white; border: 1px solid #e2e8f0;
            color: #e53e3e; font-size: 1rem; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
        }
        .list-container.edit-mode .delete-x { display: flex; }

        .edit-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; width: 100%; }
        .edit-form select, .edit-form input {
            padding: 7px 9px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.9rem;
        }
        .edit-form input[type="text"] { flex: 1 1 100%; }
        .edit-form .save-btn { background-color: var(--accent); color: white; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .edit-form .cancel-btn { background: white; color: var(--text-muted); border: 1px solid #e2e8f0; padding: 7px 14px; border-radius: 6px; cursor: pointer; }

        .list-time { font-weight: bold; font-size: 1.1rem; }
        .list-details { text-align: right; color: var(--text-muted); }
        .list-details span { font-weight: bold; color: var(--text-main); }
        .list-acronym { font-weight: 700; font-size: 0.9rem; }
        .list-item.mt .list-acronym { color: #3182ce; }
        .list-item.jtj .list-acronym { color: #d97706; }
        .list-item.babm .list-acronym { color: #059669; }
        .list-item.ga .list-acronym { color: #7c3aed; }
        .list-guest-name { font-size: 0.85rem; color: var(--text-main); margin-top: 3px; font-weight: 600; }

        @media (max-width: 600px) {
            .adj-time { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="setup-view" class="view active">
        <h2 style="margin-bottom: 10px;">Load Daily Schedule</h2>
        <p style="color: var(--text-muted); margin-top: 0; margin-bottom: 30px; font-size: 0.9rem; max-width: 320px;">
            Press CTRL + S on the main schedule, save it, and upload it here!
        </p>

        <div class="button-group" id="btn-group">
            <div class="file-btn-wrapper" id="file-btn-wrapper">
                <button class="camera-btn">📄 Upload Schedule HTML</button>
                <input type="file" accept=".html,.htm,text/html" id="html-input">
            </div>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <p id="status-text">Processing file...</p>
        </div>
        <p id="error-text"></p>
    </div>

    <div id="main-view" class="view">
        <div class="carousel" id="carousel">
            <div class="carousel-item adjacent empty" id="item-prev">
                <div class="adj-acronym" id="prev-acronym"></div>
                <div class="adj-time" id="prev-time"></div>
            </div>

            <div id="main-view-content">
                <div class="acronym" id="display-acronym">--</div>
                <div class="time" id="display-time">--:--</div>
                <div class="guest-name" id="display-name"></div>
                <div class="visitors" id="visitors-container">Expected Visitors: <span id="display-visitors">-</span></div>
            </div>

            <div class="carousel-item adjacent empty" id="item-next">
                <div class="adj-acronym" id="next-acronym"></div>
                <div class="adj-time" id="next-time"></div>
            </div>
        </div>
    </div>

    <div class="controls" id="controls">
        <div class="arrival-prompt" id="arrival-prompt">
            <span class="arrival-prompt-text" id="arrival-prompt-text"></span>
            <div class="arrival-prompt-actions">
                <button class="prompt-btn yes" onclick="answerPrompt(true)" title="Yes, arrived">&#10003;</button>
                <button class="prompt-btn no" onclick="answerPrompt(false)" title="Not yet">&#10005;</button>
            </div>
        </div>
        <button class="view-all-btn" onclick="toggleModal()">View All Arrivals</button>
        <div><button class="new-file-btn" onclick="resetApp()">Load a different schedule</button></div>
    </div>

    <div id="modal">
        <div class="modal-header">
            <h2>Today's Arrivals</h2>
            <div class="modal-header-actions">
                <button class="pencil-btn" id="pencil-btn" onclick="toggleEditMode()" title="Manual entry / edit">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
                    </svg>
                </button>
                <button class="close-btn" onclick="toggleModal()">&times;</button>
            </div>
        </div>
        <div class="add-entry-bar" id="add-entry-bar">
            <select id="add-acronym"></select>
            <input type="time" id="add-time" />
            <input type="number" min="0" id="add-visitors" placeholder="Visitors" />
            <input type="text" id="add-name" placeholder="Guest name (optional)" />
            <button onclick="addManualEntry()">Add</button>
        </div>
        <div class="list-container" id="list-container"></div>
    </div>

    <script>
        // Acronym -> display name / default tour duration (minutes added to the
        // scheduled start time to get the "arrival"/wrap time shown on screen).
        const TOUR_INFO = {
            MT:   { name: "Mansion Tour",              duration: 45 },
            JTJ:  { name: "Journey to Jubilee",         duration: 60 },
            BABM: { name: "Battle at Belle Meade",      duration: 60 },
            GA:   { name: "Grounds Only Admission",     duration: 0  }
        };

        // When multiple tours share the same arrival slot, this is the order
        // they should always be presented/combined in (lowest number first).
        // Anything not listed here (e.g. GA) sorts after all of these.
        const TOUR_ORDER = { MT: 0, JTJ: 1, BABM: 2 };
        function tourOrderRank(acronym) {
            return TOUR_ORDER.hasOwnProperty(acronym) ? TOUR_ORDER[acronym] : 99;
        }

        // Per-tour accent color, used to color each tour's own segment of
        // text when its name/visitor count is combined with other tours.
        const TOUR_COLORS = {
            MT:   '#3182ce',
            JTJ:  '#d97706',
            BABM: '#059669',
            GA:   '#7c3aed'
        };

        // How header column labels (from the FareHarbor dashboard's "items"
        // header row) map to our internal acronyms. Matching is done via
        // substring so minor label changes (e.g. "...: Civil War Tour") don't
        // break things.
        const ACRONYM_MATCHERS = [
            { acronym: 'MT',   match: t => t.includes('Mansion Tour') },
            { acronym: 'JTJ',  match: t => t.includes('Journey to Jubilee') },
            { acronym: 'BABM', match: t => t.includes('Battle at Belle Meade') },
            { acronym: 'GA',   match: t => t.includes('Grounds Only Admission') }
        ];

        let schedule = [];
        let currentIndex = 0;
        let editMode = false;

        const htmlInput = document.getElementById('html-input');
        const fileBtnWrapper = document.getElementById('file-btn-wrapper');
        const btnGroup = document.getElementById('btn-group');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');
        const errorText = document.getElementById('error-text');

        htmlInput.addEventListener('change', (e) => {
            ensureAudioContext();
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        // Drag & drop support
        ['dragover', 'dragleave', 'drop'].forEach(evt => {
            fileBtnWrapper.addEventListener(evt, (e) => {
                e.preventDefault();
                fileBtnWrapper.classList.toggle('dragover', evt === 'dragover');
            });
        });
        fileBtnWrapper.addEventListener('drop', (e) => {
            ensureAudioContext();
            const file = e.dataTransfer.files && e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        // Paste support: lets someone paste raw page-source HTML they copied
        // (e.g. Ctrl+U / "view source" then Ctrl+A, Ctrl+C) directly in.
        document.addEventListener('paste', (event) => {
            if (!document.getElementById('setup-view').classList.contains('active')) return;
            ensureAudioContext();
            const cd = event.clipboardData || event.originalEvent.clipboardData;
            if (!cd) return;
            const text = cd.getData('text/plain') || cd.getData('text/html');
            if (text && text.trim().length > 0) {
                processHTMLText(text, 'Pasted schedule');
            }
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => processHTMLText(e.target.result, file.name);
            reader.onerror = () => showError("Couldn't read that file. Please try again.");
            reader.readAsText(file);
        }

        function showError(msg) {
            progressContainer.style.display = 'none';
            btnGroup.style.display = 'flex';
            errorText.style.display = 'block';
            errorText.innerText = msg;
        }

        function processHTMLText(htmlText, sourceLabel) {
            errorText.style.display = 'none';
            btnGroup.style.display = 'none';
            progressContainer.style.display = 'block';
            progressFill.style.width = '60%';
            statusText.innerText = `Parsing ${sourceLabel}...`;

            // Give the UI a tick to paint the progress bar before parsing.
            setTimeout(() => {
                let parsed = [];
                try {
                    parsed = parseScheduleHTML(htmlText);
                } catch (err) {
                    console.error(err);
                    showError("Something went wrong reading that schedule. Make sure it's a saved dashboard HTML file.");
                    return;
                }

                progressFill.style.width = '100%';

                if (parsed.length === 0) {
                    const proceed = confirm("We couldn't find any scheduled arrivals in that file.\n\nClick 'OK' to proceed empty, or 'Cancel' to try a different file.");
                    if (!proceed) { showError("Please choose another schedule file."); return; }
                }

                startApplication(parsed);
            }, 150);
        }

        /**
         * Parses a saved FareHarbor "day view" dashboard HTML export and
         * extracts scheduled tour arrivals. Structure (as of the exported
         * markup) looks like:
         *
         *   .bookings-grid-header .tr > .td   -- one per tour/product column
         *   .table.bookings-grid > .tr        -- one row per time slot
         *     > .td.bookings-td-legend        -- the row's time label
         *     > .td (repeated)                -- one per tour/product column
         *       > .cal-block (a)              -- one per scheduled instance
         *         .cb-inline-stat             -- "N booked" visitor count
         *         .cb-private-headline        -- optional private note
         *         .cb-list.crew li span       -- assigned guide/crew name(s)
         */
        function parseScheduleHTML(htmlText) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');

            const headerCells = doc.querySelectorAll('.bookings-grid-header .tr > .td');
            if (headerCells.length === 0) return [];

            const colAcronyms = [];
            headerCells.forEach((cell, idx) => {
                if (idx === 0) { colAcronyms.push(null); return; }
                const text = cell.textContent.trim();
                const found = ACRONYM_MATCHERS.find(m => m.match(text));
                colAcronyms.push(found ? found.acronym : null);
            });

            const grid = doc.querySelector('.table.bookings-grid');
            if (!grid) return [];

            const rows = Array.from(grid.children).filter(el => el.classList && el.classList.contains('tr'));
            const results = [];

            rows.forEach(row => {
                const tds = Array.from(row.children).filter(el => el.classList && el.classList.contains('td'));
                if (tds.length === 0) return;

                const legendText = tds[0].textContent.trim();
                // Only keep rows with a real clock time (skips "All day" etc.)
                if (!/^\d{1,2}:\d{2}\s*(AM|PM)$/i.test(legendText)) return;

                tds.forEach((td, idx) => {
                    if (idx === 0) return;
                    const acronym = colAcronyms[idx];
                    if (!acronym) return; // column isn't one we track

                    const blocks = td.querySelectorAll('.cal-block');
                    blocks.forEach(block => {
                        const statSpan = block.querySelector('.cb-inline-stat');
                        let visitors = 0;
                        if (statSpan) {
                            const n = parseInt(statSpan.textContent.trim(), 10);
                            if (!isNaN(n)) visitors = n;
                        }

                        const headlineEl = block.querySelector('.cb-private-headline, .cb-headline .ng-binding');
                        const headline = headlineEl ? headlineEl.textContent.trim() : '';

                        const crewSpans = block.querySelectorAll('.cb-list.crew li span');
                        const crewNames = Array.from(crewSpans)
                            .map(s => s.textContent.trim())
                            .filter(Boolean);

                        let name = crewNames.join(', ');
                        if (headline) name = name ? `${headline} — ${name}` : headline;

                        const duration = (TOUR_INFO[acronym] && TOUR_INFO[acronym].duration) || 0;
                        results.push({
                            acronym,
                            time: calculateArrivalTime(legendText, duration),
                            visitors,
                            baseTime: legendText,
                            name,
                            arrived: false,
                            snoozeUntil: null
                        });
                    });
                });
            });

            const nonZero = results.filter(r => r.visitors > 0);
            nonZero.sort((a, b) => {
                const diff = parseTimeStringToDate(a.time) - parseTimeStringToDate(b.time);
                if (diff !== 0) return diff;
                return tourOrderRank(a.acronym) - tourOrderRank(b.acronym);
            });
            return nonZero;
        }

        document.getElementById('add-acronym').innerHTML = acronymOptionsHTML('MT');

        function startApplication(parsedSchedule) {
            schedule = parsedSchedule;
            recalcCurrentIndex();

            document.getElementById('setup-view').classList.remove('active');
            document.getElementById('main-view').classList.add('active');
            document.getElementById('controls').classList.add('active');

            updateDisplay(); populateList(); refreshPrompt();
            checkAutoArrive();
            setInterval(checkAutoAdvance, 60000);
            setInterval(checkAutoArrive, 60000);
            setInterval(refreshPrompt, 5000);
        }

        function resetApp() {
            schedule = [];
            currentIndex = 0;
            editMode = false;
            hidePrompt();
            document.getElementById('main-view').classList.remove('active');
            document.getElementById('controls').classList.remove('active');
            document.getElementById('modal').classList.remove('open');
            document.getElementById('setup-view').classList.add('active');
            btnGroup.style.display = 'flex';
            progressContainer.style.display = 'none';
            progressFill.style.width = '0%';
            errorText.style.display = 'none';
            htmlInput.value = '';
        }

        function recalcCurrentIndex() {
            const now = new Date();
            currentIndex = 0;
            while (currentIndex < schedule.length) {
                const arrivalTime = parseTimeStringToDate(schedule[currentIndex].time);
                if (now >= new Date(arrivalTime.getTime() + 10 * 60000)) {
                    currentIndex = getGroupBounds(currentIndex)[1] + 1;
                } else break;
            }
        }

        // --- Simultaneous-arrival grouping helpers ---
        // Entries sharing the same displayed arrival time are treated as one
        // group on the main screen (though they stay separate rows in the
        // "View All Arrivals" list). Since `schedule` is time-sorted, a
        // group is always a contiguous run of indices.
        function getGroupBounds(idx) {
            if (idx < 0 || idx >= schedule.length) return [idx, idx];
            const t = schedule[idx].time;
            let start = idx, end = idx;
            while (start > 0 && schedule[start - 1].time === t) start--;
            while (end < schedule.length - 1 && schedule[end + 1].time === t) end++;
            return [start, end];
        }

        // Sorts the schedule by time, and for tours sharing the same time,
        // by the fixed presentation order (Mansion Tour -> Journey to
        // Jubilee -> Battle at Belle Meade -> anything else).
        function sortSchedule() {
            schedule.sort((a, b) => {
                const diff = parseTimeStringToDate(a.time) - parseTimeStringToDate(b.time);
                if (diff !== 0) return diff;
                return tourOrderRank(a.acronym) - tourOrderRank(b.acronym);
            });
        }

        function unarrivedInGroup(start, end) {
            const arr = [];
            for (let i = start; i <= end; i++) if (!schedule[i].arrived) arr.push(i);
            return arr;
        }

        function prevGroupStart(idx) {
            const refIdx = idx - 1;
            if (refIdx < 0 || refIdx >= schedule.length) return -1;
            return getGroupBounds(refIdx)[0];
        }

        function nextGroupStart(idx) {
            if (idx < 0 || idx >= schedule.length) return -1;
            const next = getGroupBounds(idx)[1] + 1;
            return next < schedule.length ? next : -1;
        }

        // Joins a list of strings the same way in every context that combines
        // simultaneous arrivals: "A", "A & B", or "A, B & C".
        function formatJoin(list) {
            if (list.length === 0) return '';
            if (list.length === 1) return list[0];
            if (list.length === 2) return `${list[0]} & ${list[1]}`;
            return `${list.slice(0, -1).join(', ')} & ${list[list.length - 1]}`;
        }

        // Same joining logic as formatJoin, but wraps each piece in a span
        // colored for its own tour, so combined text (e.g. "Mansion Tour &
        // Journey to Jubilee") shows each tour in its correct color instead
        // of defaulting to a single accent color.
        function formatJoinColored(items) {
            if (items.length === 0) return '';
            const spans = items.map(it => `<span style="color:${it.color}">${escapeHtml(it.text)}</span>`);
            if (spans.length === 1) return spans[0];
            if (spans.length === 2) return `${spans[0]} &amp; ${spans[1]}`;
            return `${spans.slice(0, -1).join(', ')} &amp; ${spans[spans.length - 1]}`;
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function updateDisplay() {
            const acronymEl = document.getElementById('display-acronym');
            const timeEl = document.getElementById('display-time');
            const nameEl = document.getElementById('display-name');
            const visitorsContainer = document.getElementById('visitors-container');
            const visitorsEl = document.getElementById('display-visitors');

            renderAdjacent('prev', prevGroupStart(currentIndex));
            renderAdjacent('next', nextGroupStart(currentIndex));

            if (schedule.length === 0 || currentIndex >= schedule.length) {
                acronymEl.innerText = "All Caught Up!"; acronymEl.style.fontSize = "2.2rem";
                timeEl.innerText = "🙌"; visitorsContainer.style.display = "none";
                nameEl.style.display = "none"; nameEl.innerText = "";
                document.body.className = ''; return;
            }

            acronymEl.style.fontSize = "1.5rem"; visitorsContainer.style.display = "block";

            const [start, end] = getGroupBounds(currentIndex);
            let indices = unarrivedInGroup(start, end);
            if (indices.length === 0) { // fallback safety net; shouldn't normally happen
                for (let i = start; i <= end; i++) indices.push(i);
            }

            const primary = schedule[indices[0]];
            document.body.className = `theme-${primary.acronym.toLowerCase()}`;

            const nameItems = indices.map(i => ({
                text: (TOUR_INFO[schedule[i].acronym] && TOUR_INFO[schedule[i].acronym].name) || schedule[i].acronym,
                color: TOUR_COLORS[schedule[i].acronym] || 'var(--accent)'
            }));
            const visitorItems = indices.map(i => ({
                text: String(schedule[i].visitors),
                color: TOUR_COLORS[schedule[i].acronym] || 'var(--accent)'
            }));
            const guestNames = indices.map(i => schedule[i].name).filter(Boolean);

            acronymEl.innerHTML = formatJoinColored(nameItems);
            timeEl.innerText = primary.time;
            visitorsEl.innerHTML = formatJoinColored(visitorItems);

            if (guestNames.length > 0) {
                nameEl.style.display = "block";
                nameEl.innerText = formatJoin(guestNames);
            } else {
                nameEl.style.display = "none";
                nameEl.innerText = "";
            }
        }

        // Renders the small, faded preview card above (prev) or below (next)
        // the current tour group in the carousel. Hides itself if there's no
        // tour group at that index (e.g. at the start/end of the list).
        function renderAdjacent(which, idx) {
            const wrapper = document.getElementById(`item-${which}`);
            const acronymEl = document.getElementById(`${which}-acronym`);
            const timeEl = document.getElementById(`${which}-time`);

            wrapper.classList.remove('mt', 'jtj', 'babm', 'ga');

            if (idx < 0 || idx >= schedule.length) {
                wrapper.classList.add('empty');
                acronymEl.innerHTML = ''; timeEl.innerText = '';
                return;
            }

            const [start, end] = getGroupBounds(idx);
            const nameItems = [];
            for (let i = start; i <= end; i++) {
                nameItems.push({
                    text: (TOUR_INFO[schedule[i].acronym] && TOUR_INFO[schedule[i].acronym].name) || schedule[i].acronym,
                    color: TOUR_COLORS[schedule[i].acronym] || 'var(--text-muted)'
                });
            }
            wrapper.classList.remove('empty');
            wrapper.classList.add(schedule[start].acronym.toLowerCase());
            acronymEl.innerHTML = formatJoinColored(nameItems);
            timeEl.innerText = schedule[start].time;
        }

        function acronymOptionsHTML(selected) {
            return Object.keys(TOUR_INFO).map(key => {
                const sel = key === selected ? ' selected' : '';
                return `<option value="${key}"${sel}>${TOUR_INFO[key].name}</option>`;
            }).join('');
        }

        // --- Arrival confirmation prompt ---
        // Asks (one at a time) whether each unconfirmed, due tour in the
        // current group has arrived. A "no" snoozes just that tour for 5
        // minutes and, if another tour in the same group is still waiting,
        // immediately moves on to ask about that one instead.
        let promptIndex = null;
        let promptVisible = false;

        function refreshPrompt() {
            const box = document.getElementById('arrival-prompt');
            const textEl = document.getElementById('arrival-prompt-text');

            if (schedule.length === 0 || currentIndex >= schedule.length) { hidePrompt(); return; }

            const [start, end] = getGroupBounds(currentIndex);
            const unarrived = unarrivedInGroup(start, end);
            if (unarrived.length === 0) { hidePrompt(); return; }

            const now = new Date();
            if (now < parseTimeStringToDate(schedule[currentIndex].time)) { hidePrompt(); return; }

            const askableIdx = unarrived.find(i => !schedule[i].snoozeUntil || now >= schedule[i].snoozeUntil);
            if (askableIdx === undefined) { hidePrompt(); return; } // all snoozed for now

            const isNewQuestion = promptIndex !== askableIdx;
            const wasVisible = promptVisible;
            promptIndex = askableIdx;

            const entry = schedule[askableIdx];
            const fullName = (TOUR_INFO[entry.acronym] && TOUR_INFO[entry.acronym].name) || entry.acronym;
            textEl.innerText = `Did ${fullName} at ${entry.time} arrive?`;
            box.style.display = 'flex';
            promptVisible = true;

            if (!wasVisible || isNewQuestion) playDing();
        }

        function hidePrompt() {
            document.getElementById('arrival-prompt').style.display = 'none';
            promptVisible = false;
            promptIndex = null;
        }

        function answerPrompt(didArrive) {
            if (promptIndex === null) return;
            const entry = schedule[promptIndex];

            if (didArrive) {
                entry.arrived = true;
                entry.snoozeUntil = null;
                const [start, end] = getGroupBounds(promptIndex);
                if (unarrivedInGroup(start, end).length === 0) {
                    // Whole group confirmed — advance to the next one.
                    currentIndex = end + 1;
                    animateTransition(1);
                    return;
                }
            } else {
                entry.snoozeUntil = new Date(Date.now() + 5 * 60000);
            }

            updateDisplay();
            populateList();
            refreshPrompt();
        }

        // A soft two-note chime, kept quiet so it doesn't startle anyone.
        let audioCtx = null;
        function ensureAudioContext() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { /* no-op */ }
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playDing() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.0001, now);
            gainNode.gain.exponentialRampToValueAtTime(0.1, now + 0.03);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
            gainNode.connect(audioCtx.destination);

            [880, 1318.5].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                osc.connect(gainNode);
                osc.start(now + i * 0.1);
                osc.stop(now + 1.2);
            });
        }

        function populateList(editingIdx = -1) {
            const listEl = document.getElementById('list-container');
            listEl.innerHTML = '';
            schedule.forEach((item, idx) => {
                const div = document.createElement('div');
                const themeClass = item.acronym.toLowerCase();
                const pastClass = item.arrived ? 'past' : '';
                div.className = `list-item ${themeClass} ${pastClass}`;

                if (editMode && idx === editingIdx) {
                    div.innerHTML = `
                        <div class="edit-form">
                            <select id="edit-acronym-${idx}">${acronymOptionsHTML(item.acronym)}</select>
                            <input type="time" id="edit-time-${idx}" value="${to24hr(item.baseTime)}" />
                            <input type="number" min="0" id="edit-visitors-${idx}" value="${item.visitors}" style="width:70px;" />
                            <input type="text" id="edit-name-${idx}" value="${escapeHtml(item.name || '')}" placeholder="Guest name (optional)" />
                            <button class="save-btn" onclick="event.stopPropagation(); saveEditEntry(${idx})">Save</button>
                            <button class="cancel-btn" onclick="event.stopPropagation(); populateList()">Cancel</button>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="list-time">${item.time}</div>
                        <div class="list-details">
                            <span class="list-acronym">${item.acronym}</span> &bull; <span>${item.visitors} visitors</span>
                            ${item.name ? `<div class="list-guest-name">${escapeHtml(item.name)}</div>` : ''}
                            <div style="font-size: 0.8rem; color: #a0aec0; margin-top: 4px;">Tour Start: ${item.baseTime}</div>
                        </div>
                        <div class="list-actions">
                            <button class="arrived-toggle-btn ${item.arrived ? 'mark-undo' : 'mark-yes'}"
                                onclick="toggleArrived(${idx}, event)"
                                title="${item.arrived ? 'Mark as not arrived' : 'Mark as arrived'}">${item.arrived ? '&times;' : '&#10003;'}</button>
                            <div class="delete-x" onclick="deleteEntry(${idx}, event)" title="Remove">&times;</div>
                        </div>
                    `;
                    if (editMode) {
                        div.addEventListener('click', () => populateList(idx));
                    }
                }
                listEl.appendChild(div);
            });
        }

        function toggleEditMode() {
            editMode = !editMode;
            document.getElementById('pencil-btn').classList.toggle('active', editMode);
            document.getElementById('list-container').classList.toggle('edit-mode', editMode);
            document.getElementById('add-entry-bar').classList.toggle('open', editMode);
            populateList();
        }

        function addManualEntry() {
            const acronym = document.getElementById('add-acronym').value;
            const timeVal = document.getElementById('add-time').value;
            const visitorsVal = parseInt(document.getElementById('add-visitors').value, 10);
            const nameVal = document.getElementById('add-name').value.trim();

            if (!timeVal || isNaN(visitorsVal) || visitorsVal < 0) {
                alert("Please enter a valid tour start time and visitor count."); return;
            }

            const baseTimeStr = to12hr(timeVal);
            const duration = (TOUR_INFO[acronym] && TOUR_INFO[acronym].duration) || 0;

            schedule.push({
                acronym,
                time: calculateArrivalTime(baseTimeStr, duration),
                visitors: visitorsVal,
                baseTime: baseTimeStr,
                name: nameVal,
                arrived: false,
                snoozeUntil: null
            });
            sortSchedule();

            recalcCurrentIndex();
            document.getElementById('add-time').value = '';
            document.getElementById('add-visitors').value = '';
            document.getElementById('add-name').value = '';
            updateDisplay(); populateList(); refreshPrompt();
        }

        function saveEditEntry(idx) {
            const acronym = document.getElementById(`edit-acronym-${idx}`).value;
            const timeVal = document.getElementById(`edit-time-${idx}`).value;
            const visitorsVal = parseInt(document.getElementById(`edit-visitors-${idx}`).value, 10);
            const nameVal = document.getElementById(`edit-name-${idx}`).value.trim();

            if (!timeVal || isNaN(visitorsVal) || visitorsVal < 0) {
                alert("Please enter a valid tour start time and visitor count."); return;
            }

            const baseTimeStr = to12hr(timeVal);
            const duration = (TOUR_INFO[acronym] && TOUR_INFO[acronym].duration) || 0;
            const prevArrived = schedule[idx].arrived;
            const prevSnooze = schedule[idx].snoozeUntil;

            schedule[idx] = {
                acronym, time: calculateArrivalTime(baseTimeStr, duration),
                visitors: visitorsVal, baseTime: baseTimeStr, name: nameVal,
                arrived: prevArrived, snoozeUntil: prevSnooze
            };
            sortSchedule();

            recalcCurrentIndex(); updateDisplay(); populateList(); refreshPrompt();
        }

        function toggleArrived(idx, evt) {
            if (evt) evt.stopPropagation();
            const item = schedule[idx];
            item.arrived = !item.arrived;
            item.snoozeUntil = null;
            recalcCurrentIndex();
            updateDisplay();
            populateList();
            refreshPrompt();
        }

        function deleteEntry(idx, evt) {
            if (evt) evt.stopPropagation();
            if (!confirm("Remove this arrival?")) return;
            schedule.splice(idx, 1);
            recalcCurrentIndex(); updateDisplay(); populateList(); refreshPrompt();
        }

        function to12hr(timeVal) {
            const [h24, m] = timeVal.split(':').map(Number);
            const modifier = h24 >= 12 ? 'PM' : 'AM';
            const h12 = h24 % 12 || 12;
            return `${h12}:${m < 10 ? '0' + m : m} ${modifier}`;
        }

        function to24hr(timeStr) {
            const [time, modifier] = timeStr.split(' ');
            let [hours, minutes] = time.split(':').map(Number);
            if (hours === 12 && modifier === 'AM') hours = 0;
            if (hours < 12 && modifier === 'PM') hours += 12;
            const hh = hours < 10 ? '0' + hours : '' + hours;
            const mm = minutes < 10 ? '0' + minutes : '' + minutes;
            return `${hh}:${mm}`;
        }

        // --- Navigation (Scroll + Swipe) ---
        // currentIndex always points at the start of a group (or
        // schedule.length when everything's been passed), so navigating
        // always jumps a full group at a time.
        function navigate(direction) {
            if (direction === -1) {
                const target = prevGroupStart(currentIndex);
                if (target === -1) return;
                currentIndex = target;
            } else if (direction === 1) {
                const target = nextGroupStart(currentIndex);
                if (currentIndex >= schedule.length) return;
                currentIndex = target === -1 ? schedule.length : target;
            } else {
                return;
            }
            animateTransition(direction);
        }

        // Slides the whole carousel out in the direction of travel, swaps in
        // the new current/prev/next content while off-screen, then slides it
        // back in from the opposite side — giving the effect of scrolling
        // through a continuous list rather than a hard cut.
        function animateTransition(direction = 1) {
            const carousel = document.getElementById('carousel');
            const outOffset = direction > 0 ? -36 : 36;

            carousel.style.transition = 'transform 0.2s ease-in, opacity 0.2s ease-in';
            carousel.style.transform = `translateY(${outOffset}px)`;
            carousel.style.opacity = '0';

            setTimeout(() => {
                updateDisplay();
                populateList();
                refreshPrompt();

                carousel.style.transition = 'none';
                carousel.style.transform = `translateY(${-outOffset}px)`;
                void carousel.offsetHeight; // force reflow so the jump isn't animated

                carousel.style.transition = 'transform 0.25s ease-out, opacity 0.25s ease-out';
                carousel.style.transform = 'translateY(0)';
                carousel.style.opacity = '1';
            }, 200);
        }

        const mainView = document.getElementById('main-view');

        // Scroll-wheel navigation (trackpad / mouse wheel). A short cooldown
        // stops one physical scroll gesture from firing multiple navigations.
        let scrollLocked = false;
        mainView.addEventListener('wheel', e => {
            e.preventDefault();
            if (scrollLocked) return;
            if (Math.abs(e.deltaY) < 15) return;
            scrollLocked = true;
            navigate(e.deltaY > 0 ? 1 : -1);
            setTimeout(() => { scrollLocked = false; }, 400);
        }, { passive: false });

        // Vertical swipe navigation for touch devices.
        let touchstartY = 0, touchendY = 0;
        mainView.addEventListener('touchstart', e => { touchstartY = e.changedTouches[0].screenY; });
        mainView.addEventListener('touchend', e => {
            touchendY = e.changedTouches[0].screenY;
            if (touchstartY - touchendY > 50) navigate(1);  // Swipe up = next
            if (touchendY - touchstartY > 50) navigate(-1); // Swipe down = previous
        });

        function toggleModal() { document.getElementById('modal').classList.toggle('open'); }

        function parseTimeStringToDate(timeStr) {
            const [time, modifier] = timeStr.split(' ');
            let [hours, minutes] = time.split(':');
            hours = parseInt(hours, 10);
            if (hours === 12 && modifier === 'AM') hours = 0;
            if (hours < 12 && modifier === 'PM') hours += 12;

            const date = new Date();
            date.setHours(hours, parseInt(minutes, 10), 0, 0);
            return date;
        }

        function calculateArrivalTime(timeStr, addMins) {
            const date = parseTimeStringToDate(timeStr);
            date.setMinutes(date.getMinutes() + addMins);
            let h = date.getHours(), m = date.getMinutes();
            let modifier = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            return `${h}:${m} ${modifier}`;
        }

        // Any tour still unconfirmed an hour past its expected time is
        // auto-marked as arrived, regardless of what's currently on screen.
        function checkAutoArrive() {
            const now = new Date();
            let changed = false;
            schedule.forEach(item => {
                if (!item.arrived) {
                    const expected = parseTimeStringToDate(item.time);
                    if (now >= new Date(expected.getTime() + 60 * 60000)) {
                        item.arrived = true;
                        item.snoozeUntil = null;
                        changed = true;
                    }
                }
            });
            if (changed) {
                recalcCurrentIndex();
                updateDisplay();
                populateList();
                refreshPrompt();
            }
        }

        function checkAutoAdvance() {
            if (currentIndex >= schedule.length) return;
            const arrivalTime = parseTimeStringToDate(schedule[currentIndex].time);
            if (new Date() >= new Date(arrivalTime.getTime() + 10 * 60000)) {
                const [, end] = getGroupBounds(currentIndex);
                currentIndex = end + 1;
                animateTransition(1);
            }
        }
    </script>
</body>
</html>
